services:

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./sms-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: school-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - school-network
    depends_on:
      app:
        condition: service_healthy

  # ── Backend (Spring Boot) ────────────────────────────────────────────────────
  app:
    build:
      context: ./sms-service
    container_name: school-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      # CORS & URLs
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      APP_BACKEND_URL: ${APP_BACKEND_URL}
      APP_BRAND_NAME: ${APP_BRAND_NAME:-Vidhyan}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Email
      EMAIL_HOST: ${EMAIL_HOST:-smtp.sendgrid.net}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-apikey}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@vidhyan.co.in}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Vidhyan}
      EMAIL_SMTP_AUTH: "true"
      EMAIL_SMTP_STARTTLS_ENABLE: "true"
      EMAIL_SMTP_STARTTLS_REQUIRED: "true"
      # Storage (MinIO via internal Docker network)
      FILE_STORAGE_TYPE: S3
      FILE_UPLOAD_DIR: /app/uploads
      AWS_ENDPOINT: http://minio:9000
      AWS_PUBLIC_ENDPOINT: ${AWS_PUBLIC_ENDPOINT}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-student-photos}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY: ${MINIO_ROOT_USER}
      AWS_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_PATH_STYLE_ACCESS: "true"
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    networks:
      - school-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: school-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sms-service/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - school-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: school-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - school-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: school-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - school-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── MinIO bucket initializer (runs once then exits) ──────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: school-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb myminio/school-documents --ignore-existing;
      mc mb myminio/student-photos --ignore-existing;
      mc anonymous set download myminio/student-photos;
      echo 'MinIO buckets ready';
      "
    networks:
      - school-network

networks:
  school-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  app_uploads:
  app_logs:
  minio_data:
